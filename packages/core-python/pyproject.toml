[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "jsonmd"
version = "0.1.0"
description = "Append .jsonmd to any API endpoint. Get Markdown back. Save 15-55% LLM tokens."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
keywords = ["json", "markdown", "llm", "tokens", "middleware", "fastapi", "mcp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.100.0", "starlette>=0.27.0"]
test = ["pytest>=7.0", "pytest-asyncio>=0.21", "httpx>=0.24", "fastapi>=0.100.0", "starlette>=0.27.0"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
